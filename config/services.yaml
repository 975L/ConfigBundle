services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\ConfigBundle\Controller\:
        resource: '../src/Controller/*'

    c975L\ConfigBundle\Controller\Management\DashboardController:
        arguments:
            $menuProviders: !tagged_iterator c975l.management_menu_provider
        tags: ['controller.service_arguments']

    c975L\ConfigBundle\DataFixtures\:
        resource: '../src/DataFixtures/*'

    c975L\ConfigBundle\Listener\:
        resource: '../src/Listener/*'

    c975L\ConfigBundle\Management\:
        resource: '../src/Management/*'

    c975L\ConfigBundle\Repository\:
        resource: '../src/Repository/*'

    c975L\ConfigBundle\Service\:
        resource: '../src/Service/*'

    c975L\ConfigBundle\Twig\:
        resource: '../src/Twig/*'