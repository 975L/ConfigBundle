services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\ConfigBundle\:
        resource: '../src/'
        exclude: '../src/{DependencyInjection,Entity,Tests}'

    c975L\ConfigBundle\Management\MenuBuilder:
        arguments:
            $menuProviders: !tagged_iterator c975l.management_menu_provider

    c975L\ConfigBundle\Management\WhatsNewBuilder:
        arguments:
            $whatsNewProviders: !tagged_iterator c975l.whatsnew_provider

    c975L\ConfigBundle\Management\AlertBuilder:
        arguments:
            $alertProviders: !tagged_iterator c975l.alert_provider

    c975L\ConfigBundle\Management\ShortcutBuilder:
        arguments:
            $shortcutProviders: !tagged_iterator c975l.shortcut_provider

    c975L\ConfigBundle\Management\LinkableRouteRegistry:
        arguments:
            $providers: !tagged_iterator c975l.linkable_route_provider

    c975L\ConfigBundle\Controller\Management\DashboardController:
        tags: ['controller.service_arguments']

    c975L\ConfigBundle\Service\StylesheetProvider:
        tags:
            - { name: 'ui.management_stylesheet' }

